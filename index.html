<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run:AI 기술 심층 분석: Job/Queue 모델 및 스케줄링</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #1e40af; font-weight: 600; }
        .tab-inactive { color: #64748b; }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s ease; }
        .step-connector { height: 2px; flex-grow: 1; background-color: #e2e8f0; position: relative; top: 1.5rem; z-index: 0; }
        .step-connector.active { background-color: #3b82f6; }
        /* Chart Container Styles */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container { height: 350px; }
        }
    </style>
    <!-- Chosen Palette: Tech Corporate (Slate & Blue) - Professional, clean, and authoritative. -->
    <!-- Application Structure Plan: 
         1. Header: Clear title and purpose.
         2. Navigation: Tab-based interface to switch between logical sections (Overview, Comparison, Mechanics, Architecture).
         3. Comparison View: Interactive matrix + Radar chart to visualize the qualitative gap between K8s and Run:AI.
         4. Mechanics View (Deep Dive): Interactive visualizers for "Gang Scheduling" (Grid simulation) and "Quota" (Bar chart simulation) to explain abstract concepts concretely.
         5. Architecture View: Step-by-step interactive flow diagram to explain the lifecycle of a Job.
         Rationale: This structure moves from high-level value -> direct comparison -> technical "how it works" -> system architecture, allowing the user to drill down into complexity.
    -->
    <!-- Visualization & Content Choices:
         - Comparison Matrix: HTML Table + JS interaction to show details.
         - Capability Radar: Chart.js Radar to visually demonstrate the "shape" of features (Run:AI expanding beyond K8s).
         - Gang Scheduling Sim: HTML Grid + JS to simulate resource locking (Bin Packing/Deadlock scenarios).
         - Architecture Flow: Flexbox-based steps with JS content toggling. No SVG/Mermaid used.
         - Justification: These interactive elements turn static text concepts into dynamic, understandable models.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">R</div>
                <h1 class="text-xl font-bold text-slate-900">Run:AI Technical Deep Dive</h1>
            </div>
            <div class="hidden md:flex space-x-6 text-sm">
                <span class="text-slate-500">Job/Queue Model Research</span>
                <span class="text-slate-300">|</span>
                <span class="text-slate-500">Scheduler Architecture</span>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex space-x-8 overflow-x-auto" id="nav-tabs">
                <!-- JS will populate tabs -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <div id="content-area" class="space-y-8">
            <!-- Content injected by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm">
            <p>&copy; 2024 Tech Research Interactive. Based on Run:AI Architecture Analysis.</p>
        </div>
    </footer>

    <script>
        // --- DATA STORE ---
        const appData = {
            currentTab: 'comparison',
            tabs: [
                { id: 'overview', label: '개요 (Overview)' },
                { id: 'comparison', label: 'Pod vs Job 스케줄링' },
                { id: 'mechanics', label: '핵심 메커니즘 (Deep Dive)' },
                { id: 'architecture', label: '아키텍처 워크플로우' }
            ],
            comparisonData: [
                { aspect: '기본 단위', k8s: 'Pod (컨테이너 집합)', runai: 'Job (Pod의 논리적 그룹)', desc: 'Run:AI는 분산 학습을 위해 연관된 모든 Pod를 하나의 Job으로 관리합니다.' },
                { aspect: '자원 선점', k8s: 'FIFO (선입선출) 중심', runai: 'Quota & Priority 기반 선점', desc: 'Run:AI는 프로젝트별 할당량(Quota)과 우선순위에 따라 실행 중인 낮은 우선순위 작업을 중단(Resume/Suspend)시킬 수 있습니다.' },
                { aspect: '대기열 관리', k8s: 'Pending 상태로 방치', runai: '중앙 집중식 Queue & 정책 관리', desc: '자원이 부족할 때 K8s는 단순히 Pending 상태가 되지만, Run:AI는 Queue에서 순서를 관리하고 정책에 따라 자동 투입합니다.' },
                { aspect: 'GPU 할당', k8s: '정수 단위 (1, 2...)', runai: 'Fractional GPU (0.5, 0.1...)', desc: '하나의 물리적 GPU를 여러 워크로드가 나누어 쓸 수 있어 리소스 활용률을 극대화합니다.' },
                { aspect: '병렬 처리', k8s: '개별 Pod 판단 (Deadlock 위험)', runai: 'Gang Scheduling (All-or-Nothing)', desc: '분산 학습 시 필요한 모든 자원이 준비될 때까지 기다렸다가 동시에 시작하여 교착 상태를 방지합니다.' }
            ],
            architectureSteps: [
                { id: 1, title: 'Job Submission', icon: '📝', detail: '사용자가 CLI/UI를 통해 `RunaiJob` CRD를 제출합니다. 이때 필요한 GPU 수, 우선순위, 이미지 등이 정의됩니다.' },
                { id: 2, title: 'Queue Admission', icon: '📥', detail: '제출된 Job은 Project별 Queue에 적재됩니다. Project는 Department > Cluster 계층 구조 내에서 관리됩니다.' },
                { id: 3, title: 'Priority Calc', icon: '⚖️', detail: 'Scheduler가 현재 클러스터 상태, Project의 Guaranteed Quota, Over-Quota 정책을 분석하여 Job의 순위를 계산합니다.' },
                { id: 4, title: 'Allocation', icon: '🧩', detail: '최적의 노드를 선정합니다. Bin-packing(밀집) 또는 Spread(분산) 전략을 적용하여 파편화를 최소화하거나 성능을 최적화합니다.' },
                { id: 5, title: 'Execution', icon: '🚀', detail: 'Pod가 생성되고 컨테이너가 실행됩니다. 필요 시 Gang Scheduling에 의해 모든 Pod가 동시에 뜹니다.' }
            ]
        };

        // --- DOM ELEMENTS ---
        const navTabs = document.getElementById('nav-tabs');
        const contentArea = document.getElementById('content-area');

        // --- INITIALIZATION ---
        function init() {
            renderNav();
            renderContent(appData.currentTab);
        }

        // --- RENDERERS ---

        function renderNav() {
            navTabs.innerHTML = appData.tabs.map(tab => `
                <button 
                    onclick="switchTab('${tab.id}')"
                    class="pb-4 px-1 whitespace-nowrap ${appData.currentTab === tab.id ? 'tab-active' : 'tab-inactive'}"
                >
                    ${tab.label}
                </button>
            `).join('');
        }

        function switchTab(tabId) {
            appData.currentTab = tabId;
            renderNav();
            renderContent(tabId);
        }

        function renderContent(tabId) {
            contentArea.innerHTML = ''; // Clear content
            
            // Context Introduction
            const introDiv = document.createElement('div');
            introDiv.className = 'bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-6';
            
            let introTitle = '';
            let introText = '';

            switch(tabId) {
                case 'overview':
                    introTitle = 'Run:AI 기술 개요';
                    introText = '표준 Kubernetes 스케줄러는 일반적인 마이크로서비스를 위해 설계되었습니다. 하지만 AI/ML 워크로드는 거대하고, 비싸며, 실행 시간이 깁니다. Run:AI는 Kubernetes 위에 <strong>AI 최적화 스케줄링 레이어</strong>를 추가하여 "Job/Queue 모델"을 구현했습니다. 이를 통해 GPU 활용률을 극대화하고 팀 간 공정한 자원 분배를 보장합니다.';
                    renderOverview(introDiv, introTitle, introText);
                    break;
                case 'comparison':
                    introTitle = 'Pod 스케줄링 vs Job/Queue 스케줄링';
                    introText = 'Kubernetes의 기본 단위인 Pod와 Run:AI의 Job 간의 구조적 차이를 비교합니다. Run:AI가 어떻게 "단순 배치"를 넘어 "전략적 관리"를 수행하는지 아래 비교표와 차트를 통해 확인하십시오.';
                    renderComparison(introDiv, introTitle, introText);
                    break;
                case 'mechanics':
                    introTitle = '심층 분석: 핵심 메커니즘';
                    introText = 'Run:AI 아키텍처의 두 가지 핵심 기둥인 <strong>Gang Scheduling</strong>(동시성 보장)과 <strong>Quota Management</strong>(동적 할당)를 시각적으로 시뮬레이션합니다. 아래의 상호작용 도구를 통해 원리를 이해해보세요.';
                    renderMechanics(introDiv, introTitle, introText);
                    break;
                case 'architecture':
                    introTitle = '아키텍처 및 워크플로우';
                    introText = '사용자의 Job 제출부터 실제 GPU 할당까지의 내부 처리 과정을 단계별로 시각화했습니다. 각 단계는 Run:AI의 Custom Resource Definition(CRD)과 Advanced Scheduler가 협력하여 작동합니다.';
                    renderArchitecture(introDiv, introTitle, introText);
                    break;
            }
        }

        // --- SECTION BUILDERS ---

        function renderOverview(container, title, text) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-slate-900 mb-2">${title}</h2>
                <p class="text-slate-600 leading-relaxed">${text}</p>
            `;
            contentArea.appendChild(container);

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 md:grid-cols-3 gap-6';
            
            const stats = [
                { label: 'GPU Utilization', value: 'Up to 90%', sub: 'vs 30-40% in Standard K8s', color: 'text-emerald-600' },
                { label: 'Scheduling Unit', value: 'Job-Based', sub: 'Gang Scheduling Support', color: 'text-blue-600' },
                { label: 'Resource View', value: 'Fractional', sub: 'Shared GPU Access', color: 'text-purple-600' }
            ];

            stats.forEach(stat => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-center card-hover';
                card.innerHTML = `
                    <div class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-1">${stat.label}</div>
                    <div class="text-3xl font-bold ${stat.color} mb-1">${stat.value}</div>
                    <div class="text-xs text-slate-400">${stat.sub}</div>
                `;
                grid.appendChild(card);
            });
            contentArea.appendChild(grid);
        }

        function renderComparison(container, title, text) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-slate-900 mb-2">${title}</h2>
                <p class="text-slate-600 leading-relaxed">${text}</p>
            `;
            contentArea.appendChild(container);

            const layout = document.createElement('div');
            layout.className = 'grid grid-cols-1 lg:grid-cols-2 gap-8';

            // Table
            const tableContainer = document.createElement('div');
            tableContainer.className = 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden';
            let tableHTML = `
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">구분</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Standard K8s</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-blue-600 uppercase tracking-wider">Run:AI</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-slate-200">
            `;
            appData.comparisonData.forEach((row, idx) => {
                tableHTML += `
                    <tr class="hover:bg-blue-50 cursor-pointer transition-colors" onclick="showComparisonDetail(${idx})">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${row.aspect}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${row.k8s}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-blue-700 font-semibold">${row.runai}</td>
                    </tr>
                `;
            });
            tableHTML += `</tbody></table>
                <div id="comp-detail-box" class="p-4 bg-slate-50 border-t border-slate-200 text-sm text-slate-600 italic">
                    표의 항목을 클릭하면 상세 설명이 표시됩니다.
                </div>
            `;
            tableContainer.innerHTML = tableHTML;

            // Chart
            const chartWrapper = document.createElement('div');
            chartWrapper.className = 'bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center';
            chartWrapper.innerHTML = `
                <h3 class="text-lg font-semibold text-slate-800 mb-4">Capability Comparison</h3>
                <div class="chart-container">
                    <canvas id="comparisonRadar"></canvas>
                </div>
            `;

            layout.appendChild(tableContainer);
            layout.appendChild(chartWrapper);
            contentArea.appendChild(layout);

            setTimeout(initRadarChart, 100);
        }

        function showComparisonDetail(idx) {
            const detailBox = document.getElementById('comp-detail-box');
            const data = appData.comparisonData[idx];
            detailBox.innerHTML = `<strong>${data.aspect}:</strong> ${data.desc}`;
            detailBox.className = 'p-4 bg-blue-50 border-t border-blue-100 text-sm text-blue-800 transition-colors';
        }

        function renderMechanics(container, title, text) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-slate-900 mb-2">${title}</h2>
                <p class="text-slate-600 leading-relaxed">${text}</p>
            `;
            contentArea.appendChild(container);

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 lg:grid-cols-2 gap-8';

            // 1. Gang Scheduling Visualizer
            const gangCard = document.createElement('div');
            gangCard.className = 'bg-white p-6 rounded-xl shadow-sm border border-slate-200';
            gangCard.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Gang Scheduling (All-or-Nothing)</h3>
                    <button onclick="toggleGangSim()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">Simulate</button>
                </div>
                <p class="text-sm text-slate-500 mb-4">분산 학습(4 GPU 필요) 요청 시 시나리오:</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="border p-2 rounded bg-slate-50">
                        <div class="text-xs text-center font-bold mb-2">Standard K8s (Deadlock Risk)</div>
                        <div class="grid grid-cols-2 gap-2" id="k8s-grid">
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 1</div>
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 2</div>
                            <div class="h-12 bg-red-100 rounded flex items-center justify-center text-xs text-red-500 font-bold border border-red-200">Busy</div>
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 4</div>
                        </div>
                        <div class="mt-2 text-xs text-center text-slate-500" id="k8s-status">대기 중...</div>
                    </div>
                    <div class="border p-2 rounded bg-slate-50">
                        <div class="text-xs text-center font-bold mb-2 text-blue-600">Run:AI (Gang)</div>
                        <div class="grid grid-cols-2 gap-2" id="runai-grid">
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 1</div>
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 2</div>
                            <div class="h-12 bg-red-100 rounded flex items-center justify-center text-xs text-red-500 font-bold border border-red-200">Busy</div>
                            <div class="h-12 bg-slate-200 rounded flex items-center justify-center text-xs">GPU 4</div>
                        </div>
                        <div class="mt-2 text-xs text-center text-slate-500" id="runai-status">대기 중...</div>
                    </div>
                </div>
            `;

            // 2. Quota Management Visualizer
            const quotaCard = document.createElement('div');
            quotaCard.className = 'bg-white p-6 rounded-xl shadow-sm border border-slate-200';
            quotaCard.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">Quota: Guaranteed vs Bursting</h3>
                </div>
                <p class="text-sm text-slate-500 mb-4">Team A 할당량: 2 GPUs. 현재 클러스터 유휴 자원 있음.</p>
                <div class="chart-container">
                    <canvas id="quotaChart"></canvas>
                </div>
                <div class="flex justify-center mt-4 space-x-2">
                    <button onclick="updateQuota('guaranteed')" class="px-3 py-1 text-xs border rounded hover:bg-slate-50">Guaranteed Only</button>
                    <button onclick="updateQuota('burst')" class="px-3 py-1 text-xs bg-blue-100 text-blue-700 border border-blue-200 rounded font-bold">Activate Bursting</button>
                </div>
            `;

            grid.appendChild(gangCard);
            grid.appendChild(quotaCard);
            contentArea.appendChild(grid);

            setTimeout(() => {
                initQuotaChart();
            }, 100);
        }

        function renderArchitecture(container, title, text) {
            container.innerHTML = `
                <h2 class="text-2xl font-bold text-slate-900 mb-2">${title}</h2>
                <p class="text-slate-600 leading-relaxed">${text}</p>
            `;
            contentArea.appendChild(container);

            const flowContainer = document.createElement('div');
            flowContainer.className = 'bg-white p-8 rounded-xl shadow-sm border border-slate-200';
            
            // Steps
            let stepsHTML = `<div class="flex flex-col md:flex-row items-center justify-between mb-8 relative">`;
            
            // Background line for desktop
            stepsHTML += `<div class="hidden md:block absolute top-1/2 left-0 w-full h-1 bg-slate-100 -z-0 transform -translate-y-1/2"></div>`;

            appData.architectureSteps.forEach((step, idx) => {
                stepsHTML += `
                    <div class="relative z-10 flex flex-col items-center group cursor-pointer" onclick="showArchDetail(${step.id})">
                        <div class="w-14 h-14 rounded-full bg-white border-4 border-slate-200 group-hover:border-blue-500 transition-colors flex items-center justify-center text-2xl shadow-sm mb-3">
                            ${step.icon}
                        </div>
                        <div class="text-sm font-bold text-slate-700 group-hover:text-blue-600">${step.title}</div>
                        <div class="text-xs text-slate-400">Step ${step.id}</div>
                    </div>
                `;
                // Add spacer for mobile if needed, or simple flow
                if (idx < appData.architectureSteps.length - 1) {
                    // Mobile arrow
                    stepsHTML += `<div class="md:hidden text-slate-300 text-xl my-2">↓</div>`;
                }
            });
            stepsHTML += `</div>`;

            // Detail Panel
            stepsHTML += `
                <div id="arch-detail-panel" class="bg-slate-50 rounded-lg p-6 border border-slate-200 min-h-[120px] transition-all">
                    <h3 class="font-bold text-lg text-slate-800 mb-2 flex items-center">
                        <span class="mr-2 text-2xl">${appData.architectureSteps[0].icon}</span>
                        ${appData.architectureSteps[0].title}
                    </h3>
                    <p class="text-slate-600">${appData.architectureSteps[0].detail}</p>
                </div>
            `;

            flowContainer.innerHTML = stepsHTML;
            contentArea.appendChild(flowContainer);
        }

        function showArchDetail(id) {
            const step = appData.architectureSteps.find(s => s.id === id);
            const panel = document.getElementById('arch-detail-panel');
            panel.innerHTML = `
                <div class="animate-fade-in">
                    <h3 class="font-bold text-lg text-slate-800 mb-2 flex items-center">
                        <span class="mr-2 text-2xl">${step.icon}</span>
                        ${step.title}
                    </h3>
                    <p class="text-slate-600">${step.detail}</p>
                </div>
            `;
        }

        // --- CHART & SIMULATION LOGIC ---

        function initRadarChart() {
            const ctx = document.getElementById('comparisonRadar').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Resource Efficiency', 'Fairness', 'Preemption', 'Visibility', 'Ease of Use'],
                    datasets: [{
                        label: 'Standard K8s',
                        data: [40, 50, 20, 30, 60],
                        fill: true,
                        backgroundColor: 'rgba(148, 163, 184, 0.2)',
                        borderColor: 'rgb(148, 163, 184)',
                        pointBackgroundColor: 'rgb(148, 163, 184)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(148, 163, 184)'
                    }, {
                        label: 'Run:AI',
                        data: [90, 95, 90, 85, 80],
                        fill: true,
                        backgroundColor: 'rgba(37, 99, 235, 0.2)',
                        borderColor: 'rgb(37, 99, 235)',
                        pointBackgroundColor: 'rgb(37, 99, 235)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgb(37, 99, 235)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    elements: { line: { borderWidth: 3 } },
                    scales: {
                        r: {
                            angleLines: { display: true },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    }
                }
            });
        }

        // Gang Scheduling Simulation Logic
        function toggleGangSim() {
            const k8sGrid = document.getElementById('k8s-grid').children;
            const runaiGrid = document.getElementById('runai-grid').children;
            const k8sStatus = document.getElementById('k8s-status');
            const runaiStatus = document.getElementById('runai-status');

            // Reset
            [...k8sGrid, ...runaiGrid].forEach(el => {
                if(!el.textContent.includes('Busy')) el.className = 'h-12 bg-slate-200 rounded flex items-center justify-center text-xs transition-colors duration-500';
            });
            k8sStatus.innerHTML = "Job 요청 (4 GPU 필요)";
            runaiStatus.innerHTML = "Job 요청 (4 GPU 필요)";

            setTimeout(() => {
                // K8s Logic: Takes whatever is free immediately
                k8sGrid[0].classList.replace('bg-slate-200', 'bg-yellow-400'); // Taking 1
                k8sGrid[1].classList.replace('bg-slate-200', 'bg-yellow-400'); // Taking 2
                k8sGrid[3].classList.replace('bg-slate-200', 'bg-yellow-400'); // Taking 4 (3 is busy)
                k8sStatus.innerHTML = "<span class='text-red-600 font-bold'>Deadlock!</span> 3개 점유, 1개 부족. 완료 불가.";
                
                // Run:AI Logic: Waits because 4 are not available (only 3 are free)
                runaiStatus.innerHTML = "자원 부족 (3/4). <span class='text-blue-600 font-bold'>Queue 대기 중...</span> (자원 점유 안함)";
                
                // Then simulate 'Busy' GPU becoming free
                setTimeout(() => {
                    const busyNodes = document.querySelectorAll('.bg-red-100');
                    busyNodes.forEach(node => {
                        node.className = 'h-12 bg-green-100 border border-green-300 rounded flex items-center justify-center text-xs text-green-700 font-bold transition-all duration-500';
                        node.innerText = "Free";
                    });

                    // Run:AI sees 4 free -> Gang Schedule!
                    runaiStatus.innerHTML = "<span class='text-emerald-600 font-bold'>All 4 Available! Gang Scheduling Start.</span>";
                    [...runaiGrid].forEach(el => el.classList.replace('bg-slate-200', 'bg-blue-500'));
                    [...runaiGrid].forEach(el => el.classList.add('text-white'));

                    // K8s is still stuck holding 3, waiting for 1
                    k8sStatus.innerHTML += " -> 1개 추가 확보 시도...";
                }, 2000);
            }, 800);
        }

        let quotaChartInstance = null;
        function initQuotaChart() {
            const ctx = document.getElementById('quotaChart').getContext('2d');
            quotaChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Team A Resources'],
                    datasets: [
                        { label: 'Guaranteed Quota', data: [2], backgroundColor: '#2563eb' },
                        { label: 'Burst (Over-Quota)', data: [0], backgroundColor: '#34d399' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 6, title: {display: true, text: 'GPUs'} },
                        x: { stacked: true },
                        y: { stacked: true }
                    }
                }
            });
        }

        function updateQuota(mode) {
            if (!quotaChartInstance) return;
            if (mode === 'guaranteed') {
                quotaChartInstance.data.datasets[1].data = [0];
            } else {
                quotaChartInstance.data.datasets[1].data = [2]; // Bursting up to 2 more
            }
            quotaChartInstance.update();
        }

        // --- BOOTSTRAP ---
        init();

    </script>
</body>
</html>
